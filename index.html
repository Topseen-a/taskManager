<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="wrapper">
        <header>
            <div id="page-banner">
                <h1 class="title">Task Manager</h1>
                <form id="search-tasks">
                    <input type="text" placeholder="Search tasks..." />
                </form>
            </div>
        </header>
        <div id="task-list">
            <h2 class="title">Tasks to do</h2>
            <ul>
                <li>
                    <div class="left">
                        <input type="checkbox" class="check">
                        <span class="name">Learn JavaScript</span>
                    </div>
                    <span class="delete">delete</span>
                </li>
                <li>
                    <div class="left">
                        <input type="checkbox" class="check">
                        <span class="name">Learn React</span>
                    </div>
                    <span class="delete">delete</span>
                </li>
                <li>
                    <div class="left">
                        <input type="checkbox" class="check">
                        <span class="name">Build a mini project</span>
                    </div>
                    <span class="delete">delete</span>
                </li>
            </ul>
        </div>
        <form id="add-task">
            <input type="text" placeholder="Add a task..." />
            <button>Add</button>
        </form>
    </div>
    <script src="./script.js"></script>
</body>
</html>
